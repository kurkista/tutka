# fly.toml app configuration file generated for salmi on 2026-07-09T13:36:30+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'salmi'
primary_region = 'arn'
swap_size_mb = 256

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/salmi.db'
  PORT = '8080'

[[mounts]]
  source = 'salmi_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
